{% load static %}
<!-- Applicant Sidebar -->
<button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Toggle sidebar">
  <i class="fa-solid fa-bars"></i>
</button>

<aside class="th-sidebar" id="appSidebar">

  <!-- Logo -->
  <div class="sidebar-logo-area">
    <a href="{% url 'home' %}" class="sidebar-logo">
      <div style="width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:.85rem;flex-shrink:0;">
        <i class="fa-solid fa-briefcase"></i>
      </div>
      TalentHub
    </a>
  </div>

  <!-- User -->
  <div class="sidebar-user-area">
    <div class="sidebar-avatar">{{ request.user.initials }}</div>
    <div style="min-width:0;">
      <p class="sidebar-user-name">{{ request.user.first_name|default:request.user.username }}</p>
      <p class="sidebar-user-email">{{ request.user.email }}</p>
    </div>
  </div>

  <!-- Nav -->
  <ul class="sidebar-nav">
    <li>
      <a href="{% url 'applicant' %}" class="{% if request.resolver_match.url_name == 'applicant' %}active{% endif %}">
        <i class="fa-solid fa-house"></i> Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'posted-jobs' %}" class="{% if request.resolver_match.url_name == 'posted-jobs' %}active{% endif %}">
        <i class="fa-solid fa-briefcase"></i> Browse Jobs
      </a>
    </li>
    <li>
      <a href="{% url 'applied-jobs' %}" class="{% if request.resolver_match.url_name == 'applied-jobs' %}active{% endif %}">
        <i class="fa-solid fa-file-lines"></i> My Applications
      </a>
    </li>
    <li>
      <a href="{% url 'saved-jobs' %}" class="{% if request.resolver_match.url_name == 'saved-jobs' %}active{% endif %}">
        <i class="fa-solid fa-bookmark"></i> Saved Jobs
      </a>
    </li>
    <li>
      <a href="{% url 'my-profile' %}" class="{% if request.resolver_match.url_name == 'my-profile' or request.resolver_match.url_name == 'edit-profile' %}active{% endif %}">
        <i class="fa-solid fa-user"></i> My Profile
      </a>
    </li>
  </ul>

  <!-- Logout -->
  <div class="sidebar-footer">
    <a href="{% url 'logout' %}" class="sidebar-logout">
      <i class="fa-solid fa-right-from-bracket"></i> Sign Out
    </a>
  </div>

</aside>

<script>
(function() {
  const btn = document.getElementById('sidebarToggle');
  const sidebar = document.getElementById('appSidebar');
  if (btn && sidebar) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      sidebar.classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== btn) {
        sidebar.classList.remove('open');
      }
    });
  }
})();
</script>
