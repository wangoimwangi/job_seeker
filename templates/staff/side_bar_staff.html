{% load static %}
<!-- Staff Sidebar -->
<button class="sidebar-toggle-btn" id="staffToggle" aria-label="Toggle sidebar">
  <i class="fa-solid fa-bars"></i>
</button>

<aside class="th-sidebar" id="staffSidebar">

  <div class="sidebar-logo-area">
    <a href="{% url 'home' %}" class="sidebar-logo">
      <div style="width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:.85rem;flex-shrink:0;">
        <i class="fa-solid fa-briefcase"></i>
      </div>
      TalentHub
    </a>
  </div>

  <div class="sidebar-user-area">
    <div class="sidebar-avatar" style="background:var(--success);">{{ request.user.initials }}</div>
    <div style="min-width:0;">
      <p class="sidebar-user-name">{{ request.user.first_name|default:request.user.username }}</p>
      <p class="sidebar-user-email">Employer</p>
    </div>
  </div>

  <ul class="sidebar-nav">
    <li>
      <a href="{% url 'staff' %}" class="{% if request.resolver_match.url_name == 'staff' %}active{% endif %}">
        <i class="fa-solid fa-gauge"></i> Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'add-job' %}" class="{% if request.resolver_match.url_name == 'add-job' %}active{% endif %}">
        <i class="fa-solid fa-plus-circle"></i> Post New Job
      </a>
    </li>
    <li>
      <a href="{% url 'job-list' %}" class="{% if request.resolver_match.url_name == 'job-list' %}active{% endif %}">
        <i class="fa-solid fa-list-check"></i> Manage Jobs
      </a>
    </li>
    <li>
      <a href="{% url 'search-applicant' %}" class="{% if request.resolver_match.url_name == 'search-applicant' %}active{% endif %}">
        <i class="fa-solid fa-users"></i> Search Applicants
      </a>
    </li>
    <li>
      <a href="{% url 'applied-any-month' %}" class="{% if request.resolver_match.url_name == 'applied-any-month' %}active{% endif %}">
        <i class="fa-solid fa-chart-bar"></i> Reports
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <a href="{% url 'logout' %}" class="sidebar-logout">
      <i class="fa-solid fa-right-from-bracket"></i> Sign Out
    </a>
  </div>

</aside>

<script>
(function() {
  const btn = document.getElementById('staffToggle');
  const sidebar = document.getElementById('staffSidebar');
  if (btn && sidebar) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      sidebar.classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== btn) {
        sidebar.classList.remove('open');
      }
    });
  }
})();
</script>
