
            <!--NAVIGATION BAR FOR THE APPLICANTS-->
{% load static %}
<!--Navbar-->
<nav class="navbar navbar-expand-lg navbar-dark py-3 modern-navbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center me-5" href="{% url 'home' %}">
            <div class="brand-icon me-2">
                <i class="bi bi-diagram-3-fill"></i>
            </div>
            <h4 class="mb-0 brand-name">TalentHub</h4>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navmenu">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item mx-2">
                    <a href="{% url 'home' %}" class="nav-link nav-link-modern">
                        <i class="bi bi-house-door me-1"></i>Home
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a href="{% url 'posted-jobs' %}" class="nav-link nav-link-modern">
                        <i class="bi bi-briefcase me-1"></i>Jobs
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a href="{% url 'services' %}" class="nav-link nav-link-modern">
                        <i class="bi bi-gear me-1"></i>Services
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a href="{% url 'contact' %}" class="nav-link nav-link-modern">
                        <i class="bi bi-envelope me-1"></i>Contact
                    </a>
                </li>
                {% if user.is_authenticated %}
                <li class="nav-item ms-lg-3">
                    <a class="btn btn-modern-logout" href="{% url 'logout' %}">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </li>
                {% else %}
                <li class="nav-item ms-lg-3">
                    <a class="btn btn-modern-login" href="{% url 'login' %}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<style>
.modern-navbar {
    background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(51, 65, 85, 0.95) 100%);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.brand-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: white;
    transition: all 0.3s ease;
}

.navbar-brand:hover .brand-icon {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.brand-name {
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.nav-link-modern {
    color: rgba(255, 255, 255, 0.9) !important;
    font-weight: 500;
    padding: 8px 15px !important;
    border-radius: 10px;
    transition: all 0.3s ease;
    position: relative;
}

.nav-link-modern:hover {
    color: white !important;
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
}

.nav-link-modern::after {
    content: '';
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: width 0.3s ease;
}

.nav-link-modern:hover::after {
    width: 70%;
}

.btn-modern-login {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white !important;
    padding: 10px 25px;
    border-radius: 50px;
    font-weight: 600;
    border: none;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn-modern-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.btn-modern-logout {
    background: rgba(239, 68, 68, 0.9);
    color: white !important;
    padding: 10px 25px;
    border-radius: 50px;
    font-weight: 600;
    border: none;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
}

.btn-modern-logout:hover {
    background: rgba(220, 38, 38, 1);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
}

@media (max-width: 991px) {
    .nav-link-modern {
        text-align: center;
        margin: 5px 0;
    }
    
    .btn-modern-login,
    .btn-modern-logout {
        width: 100%;
        margin-top: 10px;
    }
}
</style>
